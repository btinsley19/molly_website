<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Molly Tinsley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-deep: #c77b8a;
      --pink-mid: #d9a5b0;
      --pink-soft: #f0dfe4;
      --pink-dust: #e8d4da;
      --cream: #faf7f8;
      --charcoal: #2d2527;
      --text-muted: #5c4d50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      color: var(--charcoal);
      background: var(--cream);
      line-height: 1.6;
    }

    .hero {
      position: relative;
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: url('assets/1.jpg') center center / cover no-repeat;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(45, 37, 39, 0.7) 0%, rgba(45, 37, 39, 0.3) 40%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 2rem 4rem;
      max-width: 900px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 600;
      color: white;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
    }

    .hero-tagline {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Main nav */
    .main-nav {
      padding: 0.75rem 2rem 0.5rem;
      background: rgba(250, 247, 248, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--pink-dust);
    }

    .main-nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .main-nav a {
      text-decoration: none;
      color: var(--charcoal);
      font-weight: 400;
      transition: color 0.2s;
    }

    .main-nav a:hover,
    .main-nav a[aria-current="page"] {
      color: var(--pink-deep);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 2rem 0.5rem;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      color: var(--charcoal);
      transition: color 0.2s;
    }

    .social-links a:hover {
      color: var(--pink-deep);
    }

    .social-links svg {
      width: 24px;
      height: 24px;
    }

    section {
      padding: 2rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 1.25rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .contact-page-intro {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .contact-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
      gap: 2.5rem;
      align-items: flex-start;
    }

    .contact-details h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .contact-details p {
      margin-bottom: 0.5rem;
      color: var(--charcoal);
    }

    .contact-details a {
      color: var(--charcoal);
      text-decoration: none;
      border-bottom: 1px solid rgba(199, 123, 138, 0.4);
      padding-bottom: 1px;
    }

    .contact-details a:hover {
      color: var(--pink-deep);
      border-bottom-color: var(--pink-deep);
    }

    .contact-form {
      padding: 1.5rem 1.75rem;
      border-radius: 10px;
      background: white;
      border: 1px solid var(--pink-dust);
    }

    .contact-form h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 0.9rem;
    }

    .form-row label {
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-row input,
    .form-row textarea {
      padding: 0.6rem 0.9rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      border-radius: 4px;
      border: 1px solid var(--pink-dust);
      background: #fff;
      color: var(--charcoal);
      resize: vertical;
      min-height: 42px;
    }

    .form-row textarea {
      min-height: 120px;
    }

    .form-row input:focus,
    .form-row textarea:focus {
      outline: none;
      border-color: var(--pink-mid);
    }

    .contact-form button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--charcoal);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .contact-form button:hover {
      background: var(--pink-deep);
    }

    @media (max-width: 768px) {
      .hero-content {
        padding: 2.5rem 1.75rem;
      }

      section {
        padding: 1.75rem 1.5rem;
      }

      .contact-layout {
        grid-template-columns: minmax(0, 1fr);
        gap: 1.75rem;
      }
    }
  </style>
</head>
<body>

    <div class="hero-content">
      <h1 class="hero-name">Get in Touch</h1>
      <p class="hero-tagline">Booking · Shows · General</p>
    </div>
  </header>

  <section>
    <h2>Contact</h2>
    <p class="contact-page-intro">
      For booking, shows, collaborations, or general inquiries, use the form below or reach out directly by email.
    </p>

    <div class="contact-layout">
      <div class="contact-details">
        <h3>Email</h3>
        <p><strong>Booking:</strong> <a href="mailto:charlotteavenuepictures@gmail.com">charlotteavenuepictures@gmail.com</a></p>
        <p><strong>General:</strong> <a href="mailto:mollytinsleymusic@gmail.com">mollytinsleymusic@gmail.com</a></p>
      </div>

      <!-- Formspree: Molly Contact form -->
      <form class="contact-form" name="contact" method="POST" action="https://formspree.io/f/xykdqpwz">
        <p class="visually-hidden"><label>Don't fill this out: <input name="_gotcha" tabindex="-1" autocomplete="off" /></label></p>

        <h3>Send a Message</h3>

        <div class="form-row">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">Send</button>
      </form>
    </div>
  </section>
